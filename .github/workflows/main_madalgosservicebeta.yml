name: Deploy Next.js to Azure

on:
  push:
    branches:
      - main

jobs:

  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Build Next.js
        run: npm run build
        env:
          MONGODB_URI: ${{ secrets.MONGODB_URI }}
          NEXT_PUBLIC_RECAPTCHA_SITE_KEY: ${{ secrets.NEXT_PUBLIC_RECAPTCHA_SITE_KEY }}

      - name: Prepare standalone release
        run: |
          mkdir release

          # Copy standalone server
          cp -r .next/standalone/* release/

          # Copy public folder
          cp -r public release/public

          # Create .next folder
          mkdir -p release/.next

          # Copy static assets
          cp -r .next/static release/.next/static

          # Copy Next.js build metadata (REQUIRED)
          cp .next/BUILD_ID release/.next/
          cp .next/build-manifest.json release/.next/
          cp .next/prerender-manifest.json release/.next/
          cp .next/routes-manifest.json release/.next/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: nextjs-build
          path: release


  deploy:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: nextjs-build
          path: release

      - name: Deploy to Azure App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: MADAlgosServiceBeta
          publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE_B2B95DFF0A5E4D85A9E235EF83667A27 }}
          package: release