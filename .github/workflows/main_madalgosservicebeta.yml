name: Deploy Next.js to Azure

on:
  push:
    branches:
      - main

jobs:

  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm install

      - run: npm run build
        env:
          MONGODB_URI: ${{ secrets.MONGODB_URI }}
          NEXT_PUBLIC_RECAPTCHA_SITE_KEY: ${{ secrets.NEXT_PUBLIC_RECAPTCHA_SITE_KEY }}

      - name: Prepare standalone build
        run: |
          mkdir release

          cp -r .next/standalone/* release/
          cp -r public release/public

          mkdir -p release/.next
          cp -r .next/static release/.next/static

      - uses: actions/upload-artifact@v4
        with:
          name: nextjs-build
          path: release


  deploy:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: nextjs-build
          path: release

      - name: Deploy to Azure
        uses: azure/webapps-deploy@v3
        with:
          app-name: MADAlgosServiceBeta
          publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE_B2B95DFF0A5E4D85A9E235EF83667A27 }}
          package: release