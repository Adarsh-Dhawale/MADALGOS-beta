name: Deploy Next.js to Azure

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Build Next.js
        run: npm run build
        env:
          MONGODB_URI: ${{ secrets.MONGODB_URI }}

      - name: Debug build output
        run: |
          echo "=== .next contents ==="
          ls -la .next/
          echo "=== standalone contents ==="
          ls -la .next/standalone/
          echo "=== standalone .next contents ==="
          ls -la .next/standalone/.next/ || echo "No .next inside standalone"

      - name: Prepare deployment folder
        run: |
          # Start fresh
          mkdir -p deploy

          # Copy standalone (this already includes server.js and node_modules)
          cp -r .next/standalone/. deploy/

          # Remove the empty/partial .next that standalone might have
          rm -rf deploy/.next

          # Copy the FULL .next build output
          cp -r .next deploy/.next

          # Ensure static files are in place
          mkdir -p deploy/.next/static
          cp -r .next/static/. deploy/.next/static/

          # Copy public assets
          cp -r public deploy/public

          echo "=== Final deploy structure ==="
          ls -la deploy/
          echo "=== deploy/.next contents ==="
          ls -la deploy/.next/

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: nextjs-build
          path: deploy

  deploy:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: nextjs-build
          path: deploy

      - name: Deploy to Azure
        uses: azure/webapps-deploy@v3
        with:
          app-name: MADAlgosServiceBeta
          publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE_B2B95DFF0A5E4D85A9E235EF83667A27 }}
          package: deploy